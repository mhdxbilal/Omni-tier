name: Omni-Tier CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_verify:
    name: Build & Verify Omni-Tier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Check Code Quality (Lint)
        run: ./gradlew lintDebug --no-daemon --parallel

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon --parallel

      - name: Assemble Debug APK
        run: ./gradlew assembleDebug --no-daemon --parallel

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: omni-tier-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
