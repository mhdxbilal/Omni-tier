name: Omni-Tier CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_verify:
    name: Build & Verify Omni-Tier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Decode Debug Keystore
        run: base64 -d debug.keystore.base64 > debug.keystore

      - name: Check Code Quality (Lint)
        run: gradle lintDebug --no-daemon --parallel

      - name: Run Unit Tests
        run: gradle testDebugUnitTest --no-daemon --parallel

      - name: Assemble Debug APK
        run: gradle assembleDebug --no-daemon --parallel

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: omni-tier-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
